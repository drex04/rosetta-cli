        unique_key_slots:
        - lengdegrad
      hoyde_m_key:
        unique_key_name: hoyde_m_key
        unique_key_slots:
        - hoyde_m
      kurs_grader_key:
        unique_key_name: kurs_grader_key
        unique_key_slots:
        - kurs_grader
      hastighet_kmh_key:
        unique_key_name: hastighet_kmh_key
        unique_key_slots:
        - hastighet_kmh
      avstand_km_key:
        unique_key_name: avstand_km_key
        unique_key_slots:
        - avstand_km
      peiling_grader_key:
        unique_key_name: peiling_grader_key
        unique_key_slots:
        - peiling_grader
      tidsstempel_key:
        unique_key_name: tidsstempel_key
        unique_key_slots:
        - tidsstempel
      signalstyrke_dbm_key:

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format
        types: [python]

      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check --fix
        types: [python]

      - id: basedpyright
        name: basedpyright
        language: system
        # Exit code 3 = warnings only (no errors) — treat as success
        entry: bash -c 'uv run basedpyright; code=$?; [ $code -eq 0 ] || [ $code -eq 3 ]'
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest (not slow)
        language: system
        entry: uv run pytest -m "not slow"
        pass_filenames: false
        types: [python]
        stages: [pre-push]

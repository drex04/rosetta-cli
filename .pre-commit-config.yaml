repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format
        types: [python]

      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check --fix
        types: [python]

      - id: basedpyright
        name: basedpyright
        language: system
        # Exit code 3 = warnings only (no errors) — treat as success
        entry: bash -c 'uv run basedpyright; code=$?; [ $code -eq 0 ] || [ $code -eq 3 ]'
        pass_filenames: false
        types: [python]

      - id: radon
        name: radon complexity
        language: system
        entry: bash -c 'uv run radon cc rosetta/core/ -n C -s | tee /dev/stderr | grep -q . && exit 1 || exit 0'
        pass_filenames: false
        types: [python]

      - id: vulture
        name: vulture dead code
        language: system
        entry: uv run vulture rosetta/ --min-confidence 80 --exclude rosetta/tests
        pass_filenames: false
        types: [python]

      - id: refurb
        name: refurb modernize
        language: system
        entry: uv run refurb rosetta/
        pass_filenames: false
        types: [python]

      - id: bandit
        name: bandit security
        language: system
        entry: uv run bandit -r rosetta/ -x rosetta/tests -ll
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest (all tests)
        language: system
        entry: uv run pytest
        pass_filenames: false
        types: [python]
        stages: [pre-push]

      - id: mkdocs-strict
        name: mkdocs build --strict
        language: system
        entry: uv run mkdocs build --strict --site-dir /tmp/rosetta-mkdocs-precommit
        pass_filenames: false
        files: ^(docs/|mkdocs\.yml$|rosetta/cli/.*\.py$)

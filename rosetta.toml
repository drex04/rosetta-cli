[general]
store_path = "store"
default_format = "turtle"

[namespaces]
rose = "http://rosetta.interop/ns/"
rose_stats = "http://rosetta.interop/ns/stats/"

[embed]
model = "intfloat/e5-large-v2"
mode = "lexical-only"

[translate]
# source_lang: "auto" = DeepL server-side detection; "EN" = passthrough
source_lang = "auto"

[suggest]
top_k = 5
min_score = 0.0
anomaly_threshold = 0.3
structural_weight = 0.2

[lint]
strict = false

[ledger]
log = "audit-log.sssom.tsv"

[functions]
# declarations = ["my_functions.fno.ttl"]
# udfs = ["my_udfs.py"]

[conversions]
# Type-pair policies: "source_linkml_type:target_linkml_type" = "FnO function CURIE"
# "float:integer" = "grel:math_round"
# "string:double" = "grel:string_toNumber"

[conversions.units]
# Unit-pair policies: "source_qudt:target_qudt" = "FnO function CURIE"
# "unit:M:unit:FT" = "rfns:meterToFoot"

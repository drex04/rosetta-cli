[general]
store_path = "store"
default_format = "turtle"

[namespaces]
rose = "http://rosetta.interop/ns/"
rose_stats = "http://rosetta.interop/ns/stats/"

[embed]
model = "intfloat/e5-large-v2"
mode = "lexical-only"

[translate]
# source_lang: "auto" = DeepL server-side detection; "EN" = passthrough
source_lang = "auto"

[suggest]
top_k = 5
min_score = 0.0
anomaly_threshold = 0.3
structural_weight = 0.2

[lint]
strict = false

[accredit]
log = "store/audit-log.sssom.tsv"
